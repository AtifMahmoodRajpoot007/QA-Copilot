[supervisord]
nodaemon=true
user=root

[program:xvfb]
command=Xvfb :99 -screen 0 %(ENV_RESOLUTION)s -ac +extension GLX +render -noreset
priority=10
autorestart=true

[program:fluxbox]
command=fluxbox -display :99
priority=20
autorestart=true
environment=DISPLAY=":99"

[program:x11vnc]
command=x11vnc -display :99 -nopw -forever -shared -bg -xkb
priority=30
autorestart=true

[program:novnc]
command=websockify --web /usr/share/novnc/ 6080 localhost:5900
priority=40
autorestart=true

[program:nextjs-app]
command=npm run start -- -p 3002
directory=/app
priority=50
autorestart=true
environment=DISPLAY=":99"
